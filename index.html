<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CRM Chăm Sóc Khách Cũ | Livestream Ads</title>
<style>
  :root{
    --gold:#c4941f; --gold-dark:#a87817; --gold-light:#fbf6e9; --gold-mid:#f5e9c2;
    --ink-900:#0a0a0a; --ink-800:#141414; --ink-700:#1f1f1f; --ink-600:#2f2f2f;
    --ink-500:#454545; --ink-400:#6b6b6b; --ink-300:#9a9a9a; --ink-200:#c6c6c6;
    --ink-100:#e7e7e7; --ink-50:#f6f6f6;
    --red:#dc2626; --red-50:#fef2f2; --red-100:#fee2e2; --red-700:#b91c1c;
    --blue:#2563eb; --blue-50:#eff6ff; --blue-100:#dbeafe; --blue-700:#1d4ed8;
    --green:#16a34a; --green-50:#f0fdf4; --green-100:#dcfce7; --green-700:#15803d;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:#fafaf8; color:var(--ink-900);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  }
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--ink-200);border-radius:8px;}
  ::-webkit-scrollbar-thumb:hover{background:var(--gold-dark);}

  .app-shell{min-height:100vh;display:flex;}
  .sidebar{
    width:260px; background:var(--ink-900); color:#fff; padding:20px 16px;
    display:flex; flex-direction:column; position:sticky; top:0; height:100vh; flex-shrink:0;
  }
  .brand{display:flex;align-items:center;gap:10px;padding:0 4px 24px;}
  .brand-icon{width:38px;height:38px;border-radius:12px;background:var(--gold);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .brand-title{font-weight:700;font-size:14px;line-height:1.2;}
  .brand-sub{font-size:11px;color:var(--ink-300);}
  .nav{display:flex;flex-direction:column;gap:4px;flex:1;}
  .nav-btn{
    display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:12px;
    font-size:14px;font-weight:500;color:var(--ink-300);background:transparent;border:none;
    cursor:pointer;text-align:left;width:100%;transition:.15s;
  }
  .nav-btn:hover{background:rgba(255,255,255,.06);color:#fff;}
  .nav-btn.active{background:var(--gold);color:var(--ink-900);}
  .sidebar-foot{font-size:11px;color:var(--ink-400);border-top:1px solid rgba(255,255,255,.1);padding-top:14px;margin-top:14px;}

  .main{flex:1;min-width:0;}
  .main-inner{max-width:1200px;margin:0 auto;padding:28px 24px;}

  .mobile-topbar{display:none;}
  .mobile-nav{display:none;}

  h1.page-title{font-size:26px;font-weight:700;margin:0 0 4px;letter-spacing:-0.02em;}
  p.page-sub{color:var(--ink-500);margin:0 0 24px;font-size:14px;}

  .card{background:#fff;border:1px solid var(--ink-100);border-radius:16px;box-shadow:0 1px 2px rgba(0,0,0,.03);}
  .card-pad{padding:20px;}

  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
  .stat-card{background:#fff;border:1px solid var(--ink-100);border-radius:16px;padding:16px;display:flex;align-items:center;justify-content:space-between;}
  .stat-card.dark{background:var(--ink-900);border-color:var(--ink-900);}
  .stat-card.warn{background:var(--red-50);border-color:var(--red-100);}
  .stat-label{font-size:12px;font-weight:500;color:var(--ink-500);}
  .stat-card.dark .stat-label{color:var(--ink-300);}
  .stat-card.warn .stat-label{color:var(--red);}
  .stat-value{font-size:24px;font-weight:700;margin-top:6px;color:var(--ink-900);}
  .stat-card.dark .stat-value{color:#fff;}
  .stat-card.warn .stat-value{color:var(--red-700);}
  .stat-icon{width:40px;height:40px;border-radius:12px;background:var(--gold-light);color:var(--gold-dark);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .stat-card.dark .stat-icon{background:var(--gold);color:var(--ink-900);}
  .stat-card.warn .stat-icon{background:var(--red-100);color:var(--red-700);}

  .badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600;white-space:nowrap;}
  .dot{width:6px;height:6px;border-radius:999px;flex-shrink:0;}
  .badge-a{background:var(--ink-100);color:var(--ink-600);}
  .badge-b{background:var(--gold-mid);color:var(--gold-dark);}
  .badge-c{background:var(--red-100);color:var(--red-700);}
  .badge-d{background:var(--green-100);color:var(--green-700);}
  .badge-hot{background:var(--red-100);color:var(--red-700);}
  .badge-warm{background:var(--gold-mid);color:var(--gold-dark);}
  .badge-cold{background:var(--blue-100);color:var(--blue-700);}
  .badge-status{background:var(--ink-50);color:var(--ink-600);border:1px solid var(--ink-100);}
  .badge-pain{background:var(--red-50);color:var(--red-700);}
  .badge-conclusion{background:var(--gold-mid);color:var(--gold-dark);}
  .badge-continue-yes{background:var(--green-100);color:var(--green-700);}
  .badge-continue-no{background:var(--ink-100);color:var(--ink-600);}

  .avatar{width:38px;height:38px;border-radius:999px;background:var(--gold-light);color:var(--gold-dark);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
  .avatar.ink{background:var(--ink-100);color:var(--ink-600);}

  .btn{display:inline-flex;align-items:center;gap:6px;justify-content:center;border-radius:12px;font-size:14px;font-weight:600;padding:10px 16px;cursor:pointer;border:none;transition:.15s;}
  .btn-gold{background:var(--gold);color:#fff;box-shadow:0 1px 2px rgba(0,0,0,.06);}
  .btn-gold:hover{background:var(--gold-dark);}
  .btn-outline{background:#fff;border:1px solid var(--ink-100);color:var(--ink-600);font-weight:500;}
  .btn-outline:hover{border-color:var(--gold);color:var(--gold-dark);}
  .btn-sm{padding:8px 12px;font-size:13px;}
  .btn-icon{padding:8px;border-radius:10px;background:transparent;border:none;cursor:pointer;color:var(--ink-500);display:inline-flex;}
  .btn-icon:hover{background:var(--ink-50);}
  .btn-icon.danger:hover{background:var(--red-50);color:var(--red-700);}

  .field{margin-bottom:0;}
  .field label{display:block;font-size:12.5px;font-weight:500;color:var(--ink-500);margin-bottom:6px;}
  .input,select.input,textarea.input{
    width:100%;border:1px solid var(--ink-100);border-radius:12px;padding:10px 13px;font-size:14px;
    outline:none;font-family:inherit;background:#fff;transition:box-shadow .15s,border-color .15s;
  }
  .input:focus{box-shadow:0 0 0 3px rgba(196,148,31,.2);border-color:var(--gold);}
  textarea.input{resize:vertical;}

  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .revenue-cols{display:grid;grid-template-columns:2fr 1fr;gap:14px;align-items:start;}
  .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}

  table{width:100%;border-collapse:collapse;font-size:14px;}
  thead th{text-align:left;padding:12px 16px;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--ink-400);background:var(--ink-50);font-weight:600;}
  thead th.right,td.right{text-align:right;}
  tbody tr{border-top:1px solid var(--ink-100);}
  tbody tr:hover{background:rgba(196,148,31,.04);}
  td{padding:12px 16px;vertical-align:middle;}
  .cell-shop{font-weight:600;color:var(--ink-900);}
  .cell-owner{color:var(--ink-500);font-size:13px;}

  .pill-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .pill{padding:7px 14px;border-radius:999px;font-size:12.5px;font-weight:600;border:1px solid var(--ink-100);color:var(--ink-500);background:#fff;cursor:pointer;}
  .pill.active{background:var(--ink-900);color:#fff;border-color:var(--ink-900);}
  .pill-group{border-radius:12px;padding:9px 10px;font-weight:600;font-size:13px;text-align:left;border:1px solid var(--ink-100);color:var(--ink-500);background:#fff;cursor:pointer;}
  .pill-group.active{border-color:var(--gold);background:var(--gold-light);color:var(--gold-dark);}
  .pill-pain{padding:7px 13px;border-radius:999px;font-size:13px;font-weight:500;border:1px solid var(--ink-100);color:var(--ink-600);background:#fff;cursor:pointer;}
  .pill-pain.active{background:var(--ink-900);color:#fff;border-color:var(--ink-900);}

  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 12px;text-align:center;}
  .empty-icon{width:48px;height:48px;border-radius:999px;background:var(--ink-50);display:flex;align-items:center;justify-content:center;margin-bottom:12px;color:var(--ink-400);}
  .empty p{font-size:13.5px;color:var(--ink-400);margin:0;}

  .modal-overlay{position:fixed;inset:0;background:rgba(10,10,10,.5);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;}
  .modal{background:#fff;border-radius:16px;max-width:640px;width:100%;margin:20px auto;box-shadow:0 20px 60px rgba(0,0,0,.25);}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--ink-100);}
  .modal-head h2{font-size:16px;font-weight:700;margin:0;}
  .modal-body{padding:20px;max-height:68vh;overflow-y:auto;}
  .modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:16px 20px;border-top:1px solid var(--ink-100);}
  .modal-section{margin-bottom:22px;}
  .modal-section:last-child{margin-bottom:0;}
  .modal-section h3{font-size:14px;font-weight:600;color:var(--ink-800);margin:0 0 10px;}

  .divider-list > div{border-top:1px solid var(--ink-100);}
  .divider-list > div:first-child{border-top:none;}

  .care-item{border-left:2px solid var(--gold);padding:2px 0 2px 14px;margin-bottom:14px;}
  .care-item:last-child{margin-bottom:0;}
  .care-date{font-size:11.5px;color:var(--ink-400);margin-bottom:3px;}
  .care-line{font-size:13.5px;color:var(--ink-800);margin:2px 0;}

  .detail-box{border:1px solid var(--ink-100);border-radius:12px;padding:14px;margin-bottom:14px;}
  .detail-box:last-child{margin-bottom:0;}

  .inline-form{background:rgba(196,148,31,.06);border-radius:12px;padding:16px;margin-bottom:18px;display:flex;flex-direction:column;gap:12px;}

  @media (max-width: 900px){
    .stat-grid{grid-template-columns:repeat(2,1fr);}
    .grid-2{grid-template-columns:1fr;}
    .revenue-cols{grid-template-columns:1fr;}
    .grid-3{grid-template-columns:1fr 1fr;}
    .sidebar{display:none;}
    .mobile-topbar{
      display:flex;align-items:center;justify-content:space-between;padding:14px 16px;
      border-bottom:1px solid var(--ink-100);background:#fff;position:sticky;top:0;z-index:20;
    }
    .mobile-nav{display:flex;gap:8px;overflow-x:auto;padding:12px 16px 4px;}
    .mobile-nav button{
      flex-shrink:0;display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:999px;
      font-size:12.5px;font-weight:600;border:1px solid var(--ink-100);background:#fff;color:var(--ink-600);cursor:pointer;
    }
    .mobile-nav button.active{background:var(--gold);color:var(--ink-900);border-color:var(--gold);}
    .main-inner{padding:16px;}
  }
  @media (max-width:600px){
    .stat-grid{grid-template-columns:1fr 1fr;}
    table{font-size:12.5px;}
    td,thead th{padding:10px;}
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>

    { cat: 'Tin nhắn hỏi thăm khách cũ', text: 'Dạ em chào chị. Trước đây shop mình có chạy quảng cáo bên em. Lâu rồi em chưa có dịp hỏi thăm. Hiện tại shop mình còn livestream đều không chị?' },
    { cat: 'Tin nhắn khai thác tình hình', text: 'Dạ hiện tại shop đang tự chạy hay có đơn vị hỗ trợ ads rồi chị?\n\nDạo này live có ổn không chị? Mắt xem, tương tác với đơn hàng có đều không ạ?' },

  function applyFilters() {
    var searchEl = document.getElementById('search-input');
    var followEl = document.getElementById('followup-filter');
    var search = searchEl ? searchEl.value.trim().toLowerCase() : '';
    var follow = followEl ? followEl.value : '';
    var rows = document.querySelectorAll('#customer-table-body tr');
    var visibleCount = 0;
    rows.forEach(function (row) {
      var matchSearch = !search || row.getAttribute('data-search').indexOf(search) !== -1;
      var matchGroup = !state.listGroupFilter || row.getAttribute('data-group') === state.listGroupFilter;
      var matchFollow = !follow || row.getAttribute('data-followup') === follow;
      var show = matchSearch && matchGroup && matchFollow;
      row.style.display = show ? '' : 'none';
      if (show) visibleCount++;
    });
    var emptyBox = document.getElementById('customer-empty');
    if (emptyBox) emptyBox.style.display = visibleCount === 0 ? 'block' : 'none';
  }

  function setListGroupFilter(g) {
    state.listGroupFilter = g;
    document.querySelectorAll('.pill-row .pill').forEach(function (btn) { btn.classList.remove('active'); });
    var idx = g === '' ? 0 : Object.keys(CUSTOMER_GROUPS).indexOf(g) + 1;
    var btns = document.querySelectorAll('.pill-row .pill');
    if (btns[idx]) btns[idx].classList.add('active');
    applyFilters();
  }

      });
    });

  function copyTemplate(idx) {
    var text = TEMPLATES[idx].text;
    var btn = document.getElementById('copy-btn-' + idx);
    function markCopied() {
      if (!btn) return;
      btn.innerHTML = icon('check', 13) + ' Đã copy';
      btn.style.background = 'var(--green-100)'; btn.style.color = 'var(--green-700)';
      setTimeout(function () {
        btn.innerHTML = icon('copy', 13) + ' Copy';
        btn.style.background = 'var(--ink-900)'; btn.style.color = '#fff';
      }, 1400);
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(markCopied).catch(function () { fallbackCopy(text, markCopied); });
    } else {
      fallbackCopy(text, markCopied);
    }
  }
  function fallbackCopy(text, cb) {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
    if (cb) cb();
  }

  /* ============== REPORTS ============== */
  function reportsHtml() {
    var c = state.customers;
    var contacted = c.filter(function (x) { return CONTACTED_STATUSES.indexOf(x.saleStatus) !== -1; }).length;
    var responded = c.filter(function (x) { return x.careHistory && x.careHistory.length > 0; }).length;
    var auditAgreed = c.filter(function (x) { return x.audits && x.audits.length > 0; }).length;
    var testAgreed = c.filter(function (x) { return x.tests && x.tests.length > 0; }).length;
    var returned = c.filter(function (x) { return x.saleStatus === 'Đã quay lại dùng dịch vụ'; }).length;
    var responseRate = contacted > 0 ? Math.round((responded / contacted) * 100) : 0;
    var testRate = auditAgreed > 0 ? Math.round((testAgreed / auditAgreed) * 100) : 0;
    var returnRate = testAgreed > 0 ? Math.round((returned / testAgreed) * 100) : 0;
    var hot = c.filter(function (x) { return x.potential === 'hot'; });

    var hotHtml = hot.length === 0 ? emptyState('flame', 'Chưa có khách hàng ở mức tiềm năng nóng.') :
      '<div class="divider-list">' + hot.map(function (x) {
        return '<div style="padding:12px 4px;display:flex;align-items:center;justify-content:space-between;">' +
          '<div style="display:flex;align-items:center;gap:12px;">' + avatar(x.ownerName) + '<span style="font-weight:600;">' + esc(x.shopName) + '</span></div>' + groupBadge(x.group) + '</div>';
      }).join('') + '</div>';

    return pageHeader('Báo cáo hiệu quả', 'Theo dõi tỷ lệ chuyển đổi trong quá trình chăm sóc khách cũ.') +
      '<div class="stat-grid" style="grid-template-columns:repeat(3,1fr);">' +
      statCard('Tổng khách đã liên hệ', contacted, 'users', 'dark') +
      statCard('Tổng khách phản hồi', responded, 'message') +
      statCard('Tổng khách đồng ý audit', auditAgreed, 'eye') +
      statCard('Tổng khách đồng ý test nhỏ', testAgreed, 'sparkle') +
      statCard('Tổng khách quay lại dùng dịch vụ', returned, 'rotate') +
      '</div>' +
      '<div class="grid-3" style="margin-bottom:16px;">' +
      '<div class="card" style="padding:24px;text-align:center;"><div style="font-size:32px;font-weight:700;color:var(--gold-dark);">' + responseRate + '%</div><div style="font-size:13px;color:var(--ink-500);margin-top:6px;font-weight:500;">Tỷ lệ phản hồi</div></div>' +
      '<div class="card" style="padding:24px;text-align:center;"><div style="font-size:32px;font-weight:700;color:var(--gold-dark);">' + testRate + '%</div><div style="font-size:13px;color:var(--ink-500);margin-top:6px;font-weight:500;">Tỷ lệ test lại</div></div>' +
      '<div class="card" style="padding:24px;text-align:center;"><div style="font-size:32px;font-weight:700;color:var(--gold-dark);">' + returnRate + '%</div><div style="font-size:13px;color:var(--ink-500);margin-top:6px;font-weight:500;">Tỷ lệ quay lại</div></div>' +
      '</div>' +
      '<div class="card card-pad"><div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;"><span style="color:var(--red);">' + icon('flame', 16) + '</span><h2 style="font-size:16px;font-weight:700;margin:0;">Danh sách khách nóng nhất</h2></div>' + hotHtml + '</div>';
  }

  /* ============== ADD / EDIT MODAL ============== */
  function emptyFormValues() {
    return { shopName: '', ownerName: '', phone: '', facebookLink: '', pageLink: '', industry: '', stillLive: '', runningStatus: '', currentProvider: '', stopReason: '', feeDiscussed: '', nextFollowUp: '', assignee: '', quickNote: '' };
  }

  function openAdd() {
    state.modal = { editing: null };
    state.modalGroup = 'B'; state.modalPotential = 'warm'; state.modalPainPoints = []; state.modalStatus = 'Chưa liên hệ';
    render();
  }
  function openEdit(id) {
    var x = findCustomer(id);
    if (!x) return;
    state.modal = { editing: x };
    state.modalGroup = x.group || 'B';
    state.modalPotential = x.potential || 'warm';
    state.modalPainPoints = (x.painPoints || []).slice();
    state.modalStatus = x.saleStatus || 'Chưa liên hệ';
    render();
  }
  function closeModal() { state.modal = null; render(); }

  function modalHtml() {
    if (!state.modal) return '';
    var x = state.modal.editing || emptyFormValues();
    var isEdit = !!state.modal.editing;

    var groupPills = Object.keys(CUSTOMER_GROUPS).map(function (k) {
      return '<button type="button" class="pill-group' + (state.modalGroup === k ? ' active' : '') + '" onclick="App.setModalGroup(\'' + k + '\')">' + esc(CUSTOMER_GROUPS[k].label) + '</button>';
    }).join('');
    var potOptions = Object.keys(POTENTIAL_LEVELS).map(function (k) {
      return '<option value="' + k + '"' + (state.modalPotential === k ? ' selected' : '') + '>' + esc(POTENTIAL_LEVELS[k].label) + '</option>';
    }).join('');
    var statusOptions = SALE_STATUSES.map(function (s) {
      return '<option value="' + esc(s) + '"' + (state.modalStatus === s ? ' selected' : '') + '>' + esc(s) + '</option>';
    }).join('');
    var painPills = PAIN_POINTS.map(function (p) {
      var active = state.modalPainPoints.indexOf(p) !== -1;
      return '<button type="button" class="pill-pain' + (active ? ' active' : '') + '" onclick="App.togglePain(\'' + esc(p).replace(/'/g, "\\'") + '\')">' + esc(p) + '</button>';
    }).join('');

    return '<div class="modal-overlay" onclick="if(event.target===this) App.closeModal();">' +
      '<div class="modal">' +
      '<div class="modal-head"><h2>' + (isEdit ? 'Sửa thông tin khách hàng' : 'Thêm khách hàng mới') + '</h2>' +
      '<button class="btn-icon" onclick="App.closeModal()">' + icon('x', 18) + '</button></div>' +
      '<div class="modal-body">' +

      '<div class="modal-section"><h3>Thông tin cơ bản</h3><div class="grid-2">' +
      '<div class="field"><label>Tên shop *</label><input class="input" id="f-shopName" value="' + esc(x.shopName) + '"/></div>' +
      '<div class="field"><label>Tên chủ shop *</label><input class="input" id="f-ownerName" value="' + esc(x.ownerName) + '"/></div>' +
      '<div class="field"><label>Số điện thoại/Zalo *</label><input class="input" id="f-phone" value="' + esc(x.phone) + '"/></div>' +
      '<div class="field"><label>Ngành hàng</label><input class="input" id="f-industry" value="' + esc(x.industry) + '"/></div>' +
      '<div class="field"><label>Link Facebook cá nhân</label><input class="input" id="f-facebookLink" value="' + esc(x.facebookLink) + '"/></div>' +
      '<div class="field"><label>Link fanpage/shop</label><input class="input" id="f-pageLink" value="' + esc(x.pageLink) + '"/></div>' +
      '</div></div>' +

      '<div class="modal-section"><h3>Phân loại khách</h3><div style="display:grid;gap:8px;">' + groupPills + '</div></div>' +

      '<div class="modal-section"><h3>Tình trạng</h3><div class="grid-2">' +
      '<div class="field"><label>Còn livestream đều không?</label><input class="input" id="f-stillLive" value="' + esc(x.stillLive) + '"/></div>' +
      '<div class="field"><label>Đang tự chạy hay dùng đơn vị khác?</label><input class="input" id="f-runningStatus" value="' + esc(x.runningStatus) + '"/></div>' +
      '<div class="field"><label>Tên đơn vị khác (nếu biết)</label><input class="input" id="f-currentProvider" value="' + esc(x.currentProvider) + '"/></div>' +
      '<div class="field"><label>Lý do khách nghỉ dịch vụ trước đây</label><input class="input" id="f-stopReason" value="' + esc(x.stopReason) + '"/></div>' +
      '</div></div>' +

      '<div class="modal-section"><h3>Nỗi đau hiện tại (chọn nhiều)</h3><div class="pill-row">' + painPills + '</div></div>' +

      '<div class="modal-section"><h3>Thông tin sale</h3><div class="grid-2">' +
      '<div class="field"><label>Mức độ tiềm năng</label><select class="input" id="f-potential" onchange="App.modalPotentialChange(this.value)">' + potOptions + '</select></div>' +
      '<div class="field"><label>Trạng thái sale hiện tại</label><select class="input" id="f-saleStatus" onchange="App.modalStatusChange(this.value)">' + statusOptions + '</select></div>' +
      '<div class="field"><label>Phí dịch vụ đang trao đổi</label><input class="input" id="f-feeDiscussed" value="' + esc(x.feeDiscussed) + '"/></div>' +
      '<div class="field"><label>Ngày follow-up tiếp theo</label><input type="date" class="input" id="f-nextFollowUp" value="' + esc(x.nextFollowUp) + '"/></div>' +
      '<div class="field"><label>Người phụ trách</label><input class="input" id="f-assignee" value="' + esc(x.assignee) + '"/></div>' +
      '</div><div class="field" style="margin-top:14px;"><label>Ghi chú</label><textarea class="input" rows="3" id="f-quickNote">' + esc(x.quickNote) + '</textarea></div></div>' +

      '</div>' +
      '<div class="modal-foot"><button class="btn btn-outline" onclick="App.closeModal()">Hủy</button>' +
      '<button class="btn btn-gold" onclick="App.submitCustomerForm()">' + (isEdit ? 'Lưu thay đổi' : 'Thêm khách hàng') + '</button></div>' +
      '</div></div>';
  }

  function setModalGroup(g) { state.modalGroup = g; renderModalOnly(); }
  function togglePain(p) {
    var idx = state.modalPainPoints.indexOf(p);
    if (idx === -1) state.modalPainPoints.push(p); else state.modalPainPoints.splice(idx, 1);
    renderModalOnly();
  }
  function modalPotentialChange(v) { state.modalPotential = v; }
  function modalStatusChange(v) { state.modalStatus = v; }

  function renderModalOnly() {
    var holder = document.getElementById('modal-holder');
    if (holder) holder.innerHTML = modalHtml();
  }

  function submitCustomerForm() {
    var shopName = document.getElementById('f-shopName').value.trim();
    var ownerName = document.getElementById('f-ownerName').value.trim();
    var phone = document.getElementById('f-phone').value.trim();
    if (!shopName || !ownerName || !phone) {
      alert('Vui lòng nhập đủ Tên shop, Tên chủ shop và Số điện thoại/Zalo.');
      return;
    }
    var data = {
      shopName: shopName, ownerName: ownerName, phone: phone,
      facebookLink: document.getElementById('f-facebookLink').value,
      pageLink: document.getElementById('f-pageLink').value,
      industry: document.getElementById('f-industry').value,
      group: state.modalGroup,
      stillLive: document.getElementById('f-stillLive').value,
      runningStatus: document.getElementById('f-runningStatus').value,
      currentProvider: document.getElementById('f-currentProvider').value,
      stopReason: document.getElementById('f-stopReason').value,
      painPoints: state.modalPainPoints.slice(),
      potential: document.getElementById('f-potential').value,
      saleStatus: document.getElementById('f-saleStatus').value,
      feeDiscussed: document.getElementById('f-feeDiscussed').value,
      nextFollowUp: document.getElementById('f-nextFollowUp').value,
      assignee: document.getElementById('f-assignee').value,
      quickNote: document.getElementById('f-quickNote').value
    };
    if (state.modal.editing) {
      var x = findCustomer(state.modal.editing.id);
      Object.assign(x, data);
    } else {
      data.id = uid(); data.careHistory = []; data.audits = []; data.tests = []; data.revenues = [];
      state.customers.unshift(data);
    }
    saveCustomers();
    state.modal = null;
    render();
  }

  function deleteCustomer(id) {
    var x = findCustomer(id);
    if (!x) return;
    if (!confirm('Xóa khách hàng "' + x.shopName + '"? Hành động này không thể hoàn tác.')) return;
    state.customers = state.customers.filter(function (c) { return c.id !== id; });
    saveCustomers();
    if (state.selectedId === id) { state.selectedId = null; state.view = 'customers'; }
    render();
  }

  /* ============== MAIN RENDER ============== */
  function go(view) { state.view = view; state.selectedId = null; state.mobileOpen = false; openForms = { note: false, audit: false, test: false, revenue: false }; render(); }
  function goDetail(id) { state.selectedId = id; state.view = 'detail'; openForms = { note: false, audit: false, test: false, revenue: false }; render(); }

  function mainContentHtml() {
    switch (state.view) {
      case 'dashboard': return dashboardHtml();
      case 'customers': return customerListHtml();
      case 'detail': return detailHtml();
      case 'today': return todayHtml();
      case 'revenue': return revenueHtml();
      case 'templates': return templatesHtml();
      case 'reports': return reportsHtml();
      default: return dashboardHtml();
    }
  }

  function render() {
    if (state.loading) {
      document.getElementById('app').innerHTML =
        '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;">' +
        '<div style="text-align:center;color:var(--ink-400);">' +
        '<div style="width:32px;height:32px;border:3px solid var(--ink-100);border-top-color:var(--gold);border-radius:999px;margin:0 auto 12px;animation:spin 0.8s linear infinite;"></div>' +
        '<div style="font-size:13.5px;">Đang tải dữ liệu...</div></div></div>' +
        '<style>@keyframes spin{to{transform:rotate(360deg)}}</style>';
      return;
    }
    var html = '<div class="app-shell">' + sidebarHtml() +
      '<main class="main">' + mobileNavHtml() + '<div class="main-inner">' +
      (state.syncError && SUPABASE_CONFIGURED ? '<div style="margin-bottom:16px;padding:12px 16px;border-radius:12px;background:var(--red-50);color:var(--red-700);font-size:13.5px;">' + esc(state.syncError) + '</div>' : '') +
      mainContentHtml() + '</div></main>' +
      '</div><div id="modal-holder">' + modalHtml() + '</div>';
    document.getElementById('app').innerHTML = html;
    if (state.view === 'customers') applyFilters();
    if (state.view === 'detail') { renderFormHolder('note'); renderFormHolder('audit'); renderFormHolder('test'); renderFormHolder('revenue'); }
  }

  function refreshData() {
    if (!SUPABASE_CONFIGURED) return;
    fetchFromSupabase().then(function (data) {
      if (data) { state.customers = data; render(); }
    }).catch(function () {});
  }
  document.addEventListener('visibilitychange', function () {
    if (!document.hidden && SUPABASE_CONFIGURED && !state.loading) refreshData();
  });

  /* ============== EXPOSE ============== */
  window.App = {
    go: go, goDetail: goDetail,
    openAdd: openAdd, openEdit: openEdit, closeModal: closeModal,
    setModalGroup: setModalGroup, togglePain: togglePain,
    modalPotentialChange: modalPotentialChange, modalStatusChange: modalStatusChange,
    submitCustomerForm: submitCustomerForm, deleteCustomer: deleteCustomer,
    applyFilters: applyFilters, setListGroupFilter: setListGroupFilter,
    toggleForm: toggleForm, submitNote: submitNote, submitAudit: submitAudit, submitTest: submitTest, submitRevenueDetail: submitRevenueDetail,
    changeStatus: changeStatus,
    toggleTodayNote: toggleTodayNote, saveTodayNote: saveTodayNote,
    toggleRevenueForm: toggleRevenueForm, submitGlobalRevenue: submitGlobalRevenue, deleteRevenueEntry: deleteRevenueEntry,
    refreshData: refreshData,
    sendMagicLink: sendMagicLink, verifyCode: verifyCode, backToEmailStep: backToEmailStep, logout: logout,
    copyTemplate: copyTemplate
  };

  initAuth();
})();
</script>
</body>
</html>
